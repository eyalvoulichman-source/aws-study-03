apiVersion: apps/v1
kind: Deployment
metadata:
  name: counter-app
  namespace: devops
spec:
  selector:
    matchLabels:
      app: counter
  template:
    metadata:
      labels:
        app: counter
    spec:
      containers:
      - name: web
        # שים לב: תחליף את הכתובת למטה לכתובת ה-Image האמיתית שלך ב-GitHub
        image: ghcr.io/eyalvoulichman-source/counter-app:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 5000
---
apiVersion: v1
kind: Service
metadata:
  name: counter-service
  namespace: devops
spec:
  selector:
    app: counter
  ports:
    - port: 80
      targetPort: 5000
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: counter-ingress
  namespace: devops
  annotations:
    kubernetes.io/ingress.class: nginx
spec:
  rules:
  - host: my-app.local
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: counter-service
            port:
              number: 80